services:

  mongodb:
    image: mongo:7
    container_name: matricula-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
      - ./mongo-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    image: apache/kafka:3.9.1
    container_name: matricula-kafka
    ports:
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 12

  ciclo-api:
    image: wiremock/wiremock:3.9.1
    container_name: matricula-ciclo-api
    command: ["--port", "8089", "--global-response-templating"]
    ports:
      - "8089:8089"
    volumes:
      - ./wiremock:/home/wiremock:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8089/__admin/health > /dev/null"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: matricula-process
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
      ciclo-api:
        condition: service_healthy
    environment:
      MONGODB_URI: mongodb://mongodb:27017/matriculadb
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      CICLO_API_URL: http://ciclo-api:8089
    ports:
      - "8080:8080"

volumes:
  mongo-data:
